server:
  port: 8081

spring:
  application:
    name: orders-service

  datasource:
    url: jdbc:postgresql://localhost:55432/orders
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true